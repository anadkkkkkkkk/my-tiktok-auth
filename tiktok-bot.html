<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوت تيك توك الآلي</title>
    <style>
        body { font-family: system-ui; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        button { background: #fe2c55; color: #fff; border: none; padding: 20px 40px; font-size: 20px; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>
    <div>
        <h2>🤖 اضغط الزر الوحيد لإنهاء كل شيء</h2>
        <button onclick="startBot()">بدء البوت الآلي</button>
    </div>
    <script>
        const CLIENT_KEY = 'awnp8zrsr8je0ukh';
        const REDIRECT_URI = 'https://anadkkkkkkkk.github.io/my-tiktok-auth/auth/callback';

        function startBot() {
            const state = Math.random().toString(36).substring(2);
            localStorage.setItem('tiktok_csrf_state', state);
            const authUrl = 'https://www.tiktok.com/v2/auth/authorize/' +
                '?client_key=' + CLIENT_KEY +
                '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
                '&state=' + state +
                '&scope=user.info.basic' +
                '&response_type=code';
            window.location.href = authUrl;
        }

        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const storedState = localStorage.getItem('tiktok_csrf_state');
            if (code && state && state === storedState) {
                document.querySelector('h2').textContent = '✅ تم تسجيل الدخول بنجاح! شكراً لصبرك.';
                document.querySelector('button').style.display = 'none';
                localStorage.removeItem('tiktok_csrf_state');
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });
    </script>
</body>
</html>
